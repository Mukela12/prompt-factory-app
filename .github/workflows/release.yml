name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.0.24)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS (arm64)
            target_script: dist:desktop:dmg:arm64
            artifact_glob: "release/Prompt-Factory-*-arm64.dmg"
          - os: macos-13
            label: macOS (x64)
            target_script: dist:desktop:dmg:x64
            artifact_glob: "release/Prompt-Factory-*-x64.dmg"
          - os: windows-latest
            label: Windows
            target_script: dist:desktop:win
            artifact_glob: "release/Prompt-Factory-*.exe"
          - os: ubuntu-latest
            label: Linux
            target_script: dist:desktop:linux
            artifact_glob: "release/Prompt-Factory-*.AppImage"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build artifact
        run: bun run ${{ matrix.target_script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prompt-factory-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "Prompt Factory ${{ steps.ver.outputs.tag }}" \
            --generate-notes \
            release-assets/*
